services:
  - type: web
    name: task-app-finale
    env: node
    plan: free
    rootDir: task-app/server
    buildCommand: |
      npm install
      npm run build
      cd ../task-app-client
      npm install
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 20

